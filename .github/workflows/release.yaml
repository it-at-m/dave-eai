name: release

on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: "Version to be released (e.g., 1.2.3)"
        required: true
        default: "6.0.0"
      developmentVersion:
        description: "Next version with snapshot (e.g., 1.2.4-SNAPSHOT)"
        required: true
        default: "6.0.1-SNAPSHOT"
      use-pr:
        description: "Use PR for version bump instead of direct push"
        default: "true"

env:
  IMAGE_NAME: "dave-eai"

jobs:
  release-maven:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      MVN_ARTIFACT_ID: ${{ steps.maven-release-step.outputs.MVN_ARTIFACT_ID }}
      ARTIFACT_NAME: ${{ steps.maven-release-step.outputs.artifact-name }}
    env:
      TZ: Europe/Berlin # timezone
    steps:
      - id: maven-release-step
        uses: it-at-m/lhm_actions/action-templates/actions/action-maven-release@v1.0.29
        with:
          app-path: ""
          releaseVersion: ${{ github.event.inputs.releaseVersion }}
          developmentVersion: ${{ github.event.inputs.developmentVersion }}
          use-pr: ${{ github.event.inputs.use-pr }}

  build-image:
    runs-on: ubuntu-latest
    needs: release-maven
    permissions:
      packages: write
    steps:
      - uses: it-at-m/lhm_actions/action-templates/actions/action-build-image@v1.0.29
        with:
          path: .
          image-name: ${{ env.IMAGE_NAME }}
          artifact-name: ${{ needs.release-maven.outputs.ARTIFACT_NAME }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-tags: |
            type=semver,pattern={{version}},value=${{ github.event.inputs.releaseVersion }}
          image-labels: |
            maintainer=it@m, Landeshauptstadt Muenchen (LHM)

  create-github-release:
    needs: ["release-maven", "build-image"]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        uses: it-at-m/lhm_actions/action-templates/actions/action-create-github-release@v1.0.29
        with:
          artifact-name: ${{ needs.release-maven.outputs.ARTIFACT_NAME }}
          tag-name: ${{ needs.release-maven.outputs.MVN_ARTIFACT_ID }}-${{ github.event.inputs.releaseVersion }}
          artifact-path: "./target/*.jar"
          generate-release-notes: true
  
  create-pull-request:
    uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
      with:
        title: "${{ github.ref_name }} to demo: version ${{ inputs.developmentVersion }}"
        branch: "${{ github.ref_name }}"
        base: "demo"
        body: "This PR is auto-generated"
        assignees: "${{ github.actor }}"
